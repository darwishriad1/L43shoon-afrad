name: Generate README

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Generative AI SDK
        run: pip install google-generativeai

      - name: Generate README via Python & Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c '
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])

          # جمع هيكل الملفات في المشروع
          file_list = []
          for root, dirs, files in os.walk("."):
              if ".git" in root or ".github" in root:
                  continue
              for file in files:
                  file_list.append(os.path.join(root, file))

          files_summary = "\n".join(file_list[:50])

          prompt = f"""
          You are an expert technical writer. Based on this repository file structure, write a professional, comprehensive, and well-structured README.md file in Markdown format. 
          The repository is named L43shoon-afrad (شؤون الأفراد - Personnel Affairs).

          Files in the repository:
          {files_summary}

          Provide ONLY the clean markdown content for the README.md file, starting directly with the title.
          """

          model = genai.GenerativeModel("gemini-1.5-flash")
          response = model.generate_content(prompt)

          readme_content = response.text
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(readme_content)
          print("README.md generated successfully!")
          '

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: automatic update of README.md using Gemini AI"
          file_pattern: README.md
